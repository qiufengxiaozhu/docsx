<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>文档比对结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; overflow: hidden; height: 100vh; }
        .top-bar { height: 44px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 16px; font-size: 13px; }
        .main-body { display: flex; height: calc(100vh - 44px); }
        .doc-area { flex: 1; display: flex; position: relative; min-width: 0; }
        .doc-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid #e8e8e8; }
        .doc-panel:last-of-type { border-right: none; }
        .doc-panel .panel-header { height: 32px; background: #fafafa; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: #888; }
        .doc-panel .panel-body { flex: 1; overflow: hidden; background: #e8eaed; }
        .doc-panel .panel-body iframe { width: 100%; height: 100%; border: none; }
        .diff-panel { width: 308px; min-width: 308px; background: #fff; border-left: 1px solid #E8EBEF; display: flex; flex-direction: column; transition: width 0.3s, min-width 0.3s; }
        .diff-panel.collapsed { width: 0; min-width: 0; overflow: hidden; border-left: none; }
        .diff-panel-toggle { position: absolute; right: 308px; top: 50%; transform: translateY(-50%); width: 20px; height: 48px; background: #fff; border: 1px solid #e8e8e8; border-right: none; border-radius: 4px 0 0 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #888; z-index: 20; transition: right 0.3s; }
        .diff-panel-toggle.collapsed { right: 0; }
        .diff-panel-header { padding: 12px 16px; border-bottom: 1px solid #e8e8e8; font-size: 14px; font-weight: 500; }
        .diff-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .loading-center { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span>文档比对结果</span>
        <span style="flex:1"></span>
        <span id="statusText" style="color:#888">加载中...</span>
    </div>
    <div class="main-body">
        <div class="doc-area">
            <div class="doc-panel" id="panelA">
                <div class="panel-header">文档 A</div>
                <div class="panel-body"><div class="loading-center">加载中...</div></div>
            </div>
            <div class="doc-panel" id="panelB">
                <div class="panel-header">文档 B</div>
                <div class="panel-body"><div class="loading-center">加载中...</div></div>
            </div>
        </div>
        <div class="diff-panel-toggle" id="panelToggle" onclick="toggleDiffPanel()">›</div>
        <div class="diff-panel" id="diffPanel">
            <div class="diff-panel-header">差异列表</div>
            <div class="diff-list" id="diffList">
                <div class="loading-center">等待比对完成...</div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var sessionId = [[${sessionId}]];

        function toggleDiffPanel() {
            var panel = document.getElementById('diffPanel');
            var toggle = document.getElementById('panelToggle');
            panel.classList.toggle('collapsed');
            var isCollapsed = panel.classList.contains('collapsed');
            toggle.classList.toggle('collapsed', isCollapsed);
            toggle.textContent = isCollapsed ? '‹' : '›';
        }

        // TODO: Phase 3 - 加载比对结果、渲染差异面板、加载 OnlyOffice 文档
    </script>
</body>
</html>
